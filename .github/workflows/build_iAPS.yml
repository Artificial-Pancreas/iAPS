name: 4. Build iAPS
run-name: Build iAPS (${{ github.ref_name }})

on:
  workflow_dispatch:
  push:

env:
  UPSTREAM_REPO: Artificial-Pancreas/iAPS
  UPSTREAM_BRANCH: ${{ github.ref_name }}
  TARGET_BRANCH: ${{ github.ref_name }}
  ALIVE_BRANCH: alive

jobs:
  auto_build_check:
    name: Check Auto Build Status
    runs-on: ubuntu-latest
    outputs:
      AUTO_BUILD_ENABLED: ${{ steps.auto_build_enabled.outputs.auto_build }}

    steps:
      - name: Is Auto Build Branch
        id: auto_build_enabled
        shell: bash
        run: |
          echo "auto_build=false" >> "$GITHUB_OUTPUT"
          if [ -n "${{ vars.AUTO_BUILD_BRANCHES }}" ]; then
            if echo ",${{ vars.AUTO_BUILD_BRANCHES }}," | grep -q ",${{ github.ref_name }},"; then
              echo "auto_build=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Show Auto Build Status
        shell: bash
        run: |
          echo 'Auto Build Status: ${{ steps.auto_build_enabled.outputs.auto_build }}'

  check_certs:
    needs: auto_build_check
    name: Check certificates
    if: needs.auto_build_check.outputs.AUTO_BUILD_ENABLED == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/create_certs.yml
    secrets: inherit

  check_latest_from_upstream:
    needs: [check_certs]
    runs-on: ubuntu-latest
    name: Check upstream
    permissions:
      contents: write

    steps:
      - name: Checkout repo (default / target branch)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Ensure alive branch exists (create if missing)
        shell: bash
        run: |
          set -e
          git fetch origin --prune

          if git ls-remote --exit-code --heads origin "${{ env.ALIVE_BRANCH }}" >/dev/null 2>&1; then
            echo "alive branch exists."
          else
            echo "alive branch missing -> creating from ${{ env.TARGET_BRANCH }} and pushing..."
            git checkout -b "${{ env.ALIVE_BRANCH }}"
            git push origin "${{ env.ALIVE_BRANCH }}"
          fi

      - name: Verify checkout alive branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: ${{ env.ALIVE_BRANCH }}
          fetch-depth: 1

  build:
    name: Build
    needs: [check_certs, check_latest_from_upstream]
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Set special variables
        shell: bash
        run: |
          if [ -n "${{ vars.APP_IDENTIFIER }}" ]; then
            echo "APP_IDENTIFIER=${{ vars.APP_IDENTIFIER }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.BUILD_GROUP }}" ]; then
            echo "BUILD_GROUP=${{ vars.BUILD_GROUP }}" >> "$GITHUB_ENV"
          fi

      - name: Select Xcode version (stable)
        shell: bash
        run: |
          set -e
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select --switch "/Applications/Xcode_16.2.app/Contents/Developer"
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select --switch "/Applications/Xcode_16.1.app/Contents/Developer"
          elif [ -d "/Applications/Xcode_15.4.app" ]; then
            sudo xcode-select --switch "/Applications/Xcode_15.4.app/Contents/Developer"
          else
            echo "No expected Xcode found. Installed Xcodes:"
            ls -1 /Applications | grep Xcode || true
            exit 1
          fi
          xcodebuild -version

      - name: Checkout Repo for syncing
        if: vars.SCHEDULED_SYNC == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: ${{ env.TARGET_BRANCH }}

      - name: Sync upstream changes
        if: vars.SCHEDULED_SYNC == 'true' && github.repository_owner != 'Artificial-Pancreas'
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          target_sync_branch: ${{ env.TARGET_BRANCH }}
          shallow_since: 6 months ago
          target_repo_token: ${{ secrets.GH_PAT }}
          upstream_sync_branch: ${{ env.UPSTREAM_BRANCH }}
          upstream_sync_repo: ${{ env.UPSTREAM_REPO }}

      - name: Checkout Repo for building
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive
          ref: ${{ env.TARGET_BRANCH }}

      - name: Patch Match Tables
        shell: bash
        run: |
          find /usr/local/lib/ruby/gems -name table_printer.rb -print0 | xargs -0 -I{} sed -i "" "/puts(Terminal::Table.new(params))/d" "{}" || true

      # FIX: Homebrew wrapper points to bundler 4.x; force RubyGems Bundler 2.7.2
      - name: Install and force Bundler 2.7.2
        shell: bash
        run: |
          set -e

          echo "Ruby:"
          ruby -v

          # Install desired bundler (do not rely on system 'bundler' wrapper)
          gem install bundler -v 2.7.2 --no-document

          echo "Where are bundle/bundler coming from?"
          which -a bundle || true
          which -a bundler || true

          echo "Bundler 2.7.2 (forced):"
          ruby -S bundle _2.7.2_ -v

      - name: Install project dependencies
        shell: bash
        run: |
          set -e
          ruby -S bundle _2.7.2_ install --jobs 4 --retry 3

      - name: Sync clock
        shell: bash
        run: sudo sntp -sS time.windows.com

      - name: Fastlane Build & Archive
        shell: bash
        run: ruby -S bundle _2.7.2_ exec fastlane build_iAPS
        env:
          TEAMID: ${{ secrets.TEAMID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Fastlane upload to TestFlight
        shell: bash
        run: ruby -S bundle _2.7.2_ exec fastlane release
        env:
          TEAMID: ${{ secrets.TEAMID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Upload build log, IPA and Symbol artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            artifacts
            buildlog
