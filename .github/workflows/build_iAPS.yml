name: 4. Build iAPS
run-name: Build iAPS (${{ github.ref_name }})

on:
  workflow_dispatch:

  # this will trigger this workflow for any push to any branch that this workflow is
  # active on, *but*, the auto_build_check job will check to see if this branch is
  # enabled *for* being auto built, and short circuit the process if so.
  #
  # if AUTO_BUILD_BRANCHES is not set, or the current branch is not listed, this
  # workflow is triggered, but doesn't actually do anything.
  push:

env:
  UPSTREAM_REPO: Artificial-Pancreas/iAPS
  UPSTREAM_BRANCH: ${{ github.ref_name }} # branch on upstream repository to sync from
  TARGET_BRANCH: ${{ github.ref_name }}   # target branch on fork to be kept in sync
  ALIVE_BRANCH: alive

jobs:
  auto_build_check:
    name: Check Auto Build Status
    runs-on: ubuntu-latest
    outputs:
      AUTO_BUILD_ENABLED: ${{ steps.auto-build-enabled.outputs.auto_build }}

    steps:
      - name: Is Auto Build Branch
        id: auto-build-enabled
        shell: bash
        run: |
          echo "auto_build=false" >> "$GITHUB_OUTPUT"
          if [ -n "${{ vars.AUTO_BUILD_BRANCHES }}" ]; then
            if echo ",${{ vars.AUTO_BUILD_BRANCHES }}," | grep -q ",${{ github.ref_name }},"; then
              echo "auto_build=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Show Auto Build Status
        run: echo "Auto Build Status: ${{ steps.auto-build-enabled.outputs.auto_build }}"

  # Checks if Distribution certificate is present and valid
  check_certs:
    needs: auto_build_check
    name: Check certificates
    if: needs.auto_build_check.outputs.AUTO_BUILD_ENABLED == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/create_certs.yml
    secrets: inherit

  check_latest_from_upstream:
    needs: [check_certs]
    runs-on: ubuntu-latest
    name: Check upstream
    outputs:
      NEW_COMMITS: ${{ steps.sync.outputs.has_new_commits }}

    steps:
      - name: Checkout target repo (alive)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: ${{ env.ALIVE_BRANCH }}
          fetch-depth: 1

      # Optional: If you actually need an upstream check here, add it.
      # Currently this job only ensures the 'alive' branch exists and is fetchable.

  build:
    name: Build
    needs: [check_certs, check_latest_from_upstream]
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Set special variables
        shell: bash
        run: |
          if [ -n "${{ vars.APP_IDENTIFIER }}" ]; then
            echo "APP_IDENTIFIER=${{ vars.APP_IDENTIFIER }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.BUILD_GROUP }}" ]; then
            echo "BUILD_GROUP=${{ vars.BUILD_GROUP }}" >> "$GITHUB_ENV"
          fi

      - name: Select Xcode version (stable)
        shell: bash
        run: |
          set -e
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select --switch "/Applications/Xcode_16.2.app/Contents/Developer"
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select --switch "/Applications/Xcode_16.1.app/Contents/Developer"
          elif [ -d "/Applications/Xcode_15.4.app" ]; then
            sudo xcode-select --switch "/Applications/Xcode_15.4.app/Contents/Developer"
          else
            echo "No expected Xcode found. Installed Xcodes:"
            ls -1 /Applications | grep Xcode || true
            exit 1
          fi
          xcodebuild -version

      - name: Checkout Repo for syncing
        if: vars.SCHEDULED_SYNC == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: ${{ env.TARGET_BRANCH }}

      - name: Sync upstream changes
        if: vars.SCHEDULED_SYNC == 'true' && github.repository_owner != 'Artificial-Pancreas'
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          target_sync_branch: ${{ env.TARGET_BRANCH }}
          shallow_since: 6 months ago
          target_repo_token: ${{ secrets.GH_PAT }}
          upstream_sync_branch: ${{ env.UPSTREAM_BRANCH }}
          upstream_sync_repo: ${{ env.UPSTREAM_REPO }}

      - name: New commits found
        if: vars.SCHEDULED_SYNC == 'true' && steps.sync.outputs.has_new_commits == 'true'
        run: echo "New commits were found to sync."

      - name: No new commits
        if: vars.SCHEDULED_SYNC == 'true' && steps.sync.outputs.has_new_commits == 'false'
        run: echo "There were no new commits."

      - name: Show value of 'has_new_commits'
        if: vars.SCHEDULED_SYNC == 'true'
        run: echo "${{ steps.sync.outputs.has_new_commits }}"

      - name: Checkout Repo for building
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive
          ref: ${{ env.TARGET_BRANCH }}

      - name: Patch Match Tables
        shell: bash
        run: |
          # If fastlane gem path differs, this is still harmless (sed just won't find files).
          find /usr/local/lib/ruby/gems -name table_printer.rb -print0 | xargs -0 -I{} sed -i "" "/puts(Terminal::Table.new(params))/d" "{}" || true

      - name: Install Bundler 2.7.2
        shell: bash
        run: |
          gem uninstall -aIx bundler || true
          gem install bundler -v 2.7.2
          bundler -v

      - name: Install project dependencies
        shell: bash
        run: |
          bundle _2.7.2_ install --jobs 4 --retry 3

      - name: Sync clock
        run: sudo sntp -sS time.windows.com

      - name: Fastlane Build & Archive
        run: bundle _2.7.2_ exec fastlane build_iAPS
        env:
          TEAMID: ${{ secrets.TEAMID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Fastlane upload to TestFlight
        run: bundle _2.7.2_ exec fastlane release
        env:
          TEAMID: ${{ secrets.TEAMID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Upload build log, IPA and Symbol artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            artifacts
            buildlog
